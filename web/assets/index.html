<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>BVSTK</title>
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="container topbar">
          <a class="brand" href="#home" aria-label="Главная">
            <img src="./logo.png" alt="BVSTK" />
            <span>BVSTK</span>
          </a>
          <nav aria-label="Разделы">
            <ul>
              <li><a data-tab="home" class="active" href="#home">Главная</a></li>
              <li><a data-tab="diag" href="#diag">Диагностика</a></li>
              <li><a data-tab="settings" href="#settings">Настройки</a></li>
            </ul>
          </nav>
        </div>
      </header>

      <main>
        <div class="container">
          <section id="tab-home" aria-label="Главная">
            <div class="tiles" role="list">
              <article class="card" role="listitem" aria-label="Сеть">
                <div class="pill"><span id="net-dot" class="dot"></span>Сеть</div>
                <table class="kv" aria-label="Сеть">
                  <tr><th>IP</th><td id="net-ip">—</td></tr>
                  <tr><th>Mode</th><td id="net-mode">—</td></tr>
                  <tr><th>Netmask</th><td id="net-netmask">—</td></tr>
                  <tr><th>Gateway</th><td id="net-gateway">—</td></tr>
                  <tr><th>MAC</th><td id="net-mac" class="mono">—</td></tr>
                </table>
              </article>

              <article class="card" role="listitem" aria-label="RTOS">
                <div class="pill"><span id="rtos-dot" class="dot"></span>RTOS</div>
                <table class="kv" aria-label="RTOS">
                  <tr><th>Uptime</th><td id="rtos-uptime">—</td></tr>
                  <tr><th>Heap free</th><td id="rtos-heap-free">—</td></tr>
                  <tr><th>Heap min</th><td id="rtos-heap-min">—</td></tr>
                  <tr><th>Tick rate</th><td id="rtos-tick">—</td></tr>
                </table>
              </article>

              <article class="card" role="listitem" aria-label="Файловые системы">
                <div class="pill"><span id="fs-dot" class="dot"></span>FS</div>
                <table class="kv" aria-label="FS">
                  <tr><th>Flash</th><td id="fs-flash">—</td></tr>
                  <tr><th>SD</th><td id="fs-sd">—</td></tr>
                </table>
              </article>

              <article class="card" role="listitem" aria-label="I2C">
                <div class="pill"><span id="i2c-dot" class="dot"></span>I2C</div>
                <table class="kv" aria-label="I2C">
                  <tr><th>Ready</th><td id="i2c-ready">—</td></tr>
                  <tr><th>Devices</th><td id="i2c-count">—</td></tr>
                  <tr>
                    <th>List</th>
                    <td class="mono">
                      <div id="i2c-list" class="scroll">—</div>
                    </td>
                  </tr>
                </table>
              </article>
            </div>
          </section>

          <section id="tab-diag" class="card hidden section" aria-label="Диагностика">
            <h2 class="section-title">Диагностика</h2>
            <p class="section-desc">Раздел в разработке.</p>
          </section>

          <section id="tab-settings" class="hidden section" aria-label="Настройки">
            <article class="card" aria-label="Сетевые настройки">
              <h2 class="section-title">Сеть</h2>
              <p class="section-desc">
                Изменение IP/маски/шлюза/MAC. При применении IP текущая сессия может оборваться.
              </p>

              <form id="net-form" class="form" autocomplete="off">
                <label class="field">
                  <span>IP</span>
                  <input id="cfg-ip" inputmode="decimal" placeholder="192.168.0.10" />
                </label>

                <label class="field">
                  <span>Netmask</span>
                  <input id="cfg-netmask" inputmode="decimal" placeholder="255.255.255.0" />
                </label>

                <label class="field">
                  <span>Gateway</span>
                  <input id="cfg-gateway" inputmode="decimal" placeholder="192.168.0.1" />
                </label>

                <label class="field">
                  <span>MAC</span>
                  <input id="cfg-mac" inputmode="text" placeholder="00:0a:35:00:01:02" />
                </label>

                <label class="check">
                  <input id="cfg-apply" type="checkbox" checked />
                  <span>Применить сразу</span>
                </label>

                <div class="actions">
                  <button id="cfg-save" type="submit">Сохранить</button>
                  <span id="cfg-status" class="status">—</span>
                </div>
              </form>
            </article>
          </section>
        </div>
      </main>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
