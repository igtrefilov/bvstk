<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>BVSTK</title>
    <style>
      :root {
        --bg: #f4f7ff;
        --text: #1e2430;
        --muted: rgba(30, 36, 48, 0.68);
        --card: rgba(255, 255, 255, 0.72);
        --card-border: rgba(255, 255, 255, 0.46);
        --shadow: 0 14px 32px rgba(38, 69, 145, 0.14);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans",
          "Liberation Sans", sans-serif;
        color: var(--text);
        background: var(--bg) url("./bg.png") center / cover no-repeat;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 22px 24px 0;
      }

      .container {
        width: min(1120px, calc(100% - 48px));
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 220px;
      }

      .brand img {
        width: 46px;
        height: 46px;
        object-fit: contain;
        filter: drop-shadow(0 12px 18px rgba(38, 69, 145, 0.25));
      }

      .brand span {
        letter-spacing: 0.06em;
        font-weight: 700;
        opacity: 0.85;
      }

      nav ul {
        display: flex;
        align-items: center;
        gap: 26px;
        list-style: none;
        padding: 0;
        margin: 0;
        font-weight: 600;
        color: rgba(30, 36, 48, 0.72);
      }

      nav a {
        position: relative;
        padding: 10px 2px;
        transition: color 160ms ease;
      }

      nav a:hover {
        color: rgba(30, 36, 48, 0.92);
      }

      nav a.active {
        color: rgba(30, 36, 48, 0.92);
      }

      nav a.active::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 2px;
        height: 2px;
        border-radius: 999px;
        background: linear-gradient(90deg, #6aa6ff, #2f66d9);
        opacity: 0.85;
      }

      main {
        flex: 1;
        padding: 54px 24px 28px;
      }

      .card {
        border-radius: var(--radius);
        background: var(--card);
        border: 1px solid var(--card-border);
        box-shadow: var(--shadow);
        padding: 20px 20px 18px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .section-title {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0.02em;
      }

      .section-desc {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="container topbar">
          <a class="brand" href="#home" aria-label="Главная">
            <img src="./logo.png" alt="BVSTK" />
            <span>BVSTK</span>
          </a>
          <nav aria-label="Разделы">
            <ul>
              <li><a data-tab="home" class="active" href="#home">Главная</a></li>
              <li><a data-tab="diag" href="#diag">Диагностика</a></li>
              <li><a data-tab="settings" href="#settings">Настройки</a></li>
            </ul>
          </nav>
        </div>
      </header>

      <main>
        <div class="container">
          <section id="tab-home" class="card" aria-label="Главная">
            <h2 class="section-title">Главная</h2>
            <p class="section-desc">Краткое состояние устройства.</p>
          </section>

          <section id="tab-diag" class="card hidden" aria-label="Диагностика" style="margin-top: 18px">
            <h2 class="section-title">Диагностика</h2>
            <p class="section-desc">Статусы подсистем и проверки.</p>
          </section>

          <section id="tab-settings" class="card hidden" aria-label="Настройки" style="margin-top: 18px">
            <h2 class="section-title">Настройки</h2>
            <p class="section-desc">Параметры устройства.</p>
          </section>
        </div>
      </main>
    </div>

    <script>
      (function () {
        const tabs = ["home", "diag", "settings"];
        const navLinks = Array.from(document.querySelectorAll("a[data-tab]"));
        const sections = new Map(
          tabs.map((t) => [t, document.getElementById("tab-" + t)])
        );

        function setActive(tab) {
          if (!sections.has(tab)) tab = "home";
          navLinks.forEach((a) => a.classList.toggle("active", a.dataset.tab === tab));
          sections.forEach((el, key) => el.classList.toggle("hidden", key !== tab));
        }

        function onHash() {
          const raw = (location.hash || "#home").slice(1);
          setActive(raw);
        }

        window.addEventListener("hashchange", onHash);
        onHash();
      })();
    </script>
  </body>
</html>
