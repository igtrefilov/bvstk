# build_fpga.sh configuration
# This file is sourced by bash, so normal shell expansions work.
# Tip: use absolute paths if repositories are not in sibling directories.

# Path to Vivado executable.
VIVADO_BIN="$HOME/Xilinx/Vivado/2021.2/bin/vivado"

# Optional: source this before running Vivado checks.
# Example: XILINX_SETTINGS="$HOME/Xilinx/Vivado/2021.2/settings64.sh"
XILINX_SETTINGS=""

# Directory containing Burevestnik_21.tcl and vivado_project/.
# Example absolute path: /data/work/hw_platform/fpga
FPGA_DIR="/home/ilya/Zynq/hw_platform/fpga"

# Vivado project name.
PROJ_NAME="Burevestnik_21"

# Number of parallel jobs for implementation.
JOBS="8"

# Output directory for design.bit and design.xsa.
# Example absolute path: /data/work/bvstk_hw/tmp
OUTPUT_DIR="$SCRIPT_DIR/../../artifacts/fpga"

# Set to 1 to delete vivado_project before build, 0 to keep it.
CLEAN="0"
